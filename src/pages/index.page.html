<div class="index-wrap" id="indexRoot">
  <div class="index-header">
    <div class="index-title" aria-label="页面标题">汉字笔顺</div>
    <div class="index-search">
      <input
        id="hzInput"
        type="text"
        inputmode="text"
        autocomplete="off"
        spellcheck="false"
        placeholder="输入汉字（用于演示/练习/预览/导出）"
        aria-label="搜索框：输入汉字"
      />
    </div>
  </div>

  <div class="index-buttons" role="tablist" aria-label="页面切换">
    <button class="practice-button" type="button" data-page-key="display" aria-pressed="true">演示</button>
    <button class="practice-button" type="button" data-page-key="practice" aria-pressed="false">练习</button>
    <button class="practice-button" type="button" data-page-key="preview" aria-pressed="false">预览</button>
    <button class="practice-button" type="button" data-page-key="export" aria-pressed="false">导出</button>
  </div>

  <div class="index-mount widget-mount" id="mount-area" aria-live="polite"></div>
</div>

<script src="./assets/utils/download.js"></script>
<script src="./assets/utils/svg-rasterize.js"></script>
<script src="./assets/widgets/display.widget.js"></script>
<script src="./assets/widgets/preview.widget.js"></script>

<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const initialHz = (params.get('hz') || '汉').trim() || '汉';

    const hzInputEl = document.getElementById('hzInput');
    hzInputEl.value = initialHz;

    const mountAreaEl = document.getElementById('mount-area');

    const btnEls = Array.from(document.querySelectorAll('[data-page-key]'));
    const pageHrefMap = {
      display: './display.html',
      practice: './practice.html',
      preview: './preview.html',
      export: './export.html'
    };
    let currentKey = (params.get('tab') || '').trim() || 'display';
    if (!['display', 'practice', 'preview', 'export'].includes(currentKey)) currentKey = 'display';

    let currentHz = initialHz;
    let cleanup = null;
    let menuEl = null;

    function updateUrl(tab, hz) {
      try {
        const url = new URL(window.location.href);
        if (hz !== undefined) url.searchParams.set('hz', hz);
        if (tab) url.searchParams.set('tab', tab);
        history.replaceState({}, '', url.toString());
      } catch (_) {}
    }

    function setActiveButton(nextKey) {
      btnEls.forEach(btn => {
        const isActive = btn.dataset.pageKey === nextKey;
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
    }

    function mountCurrent(key) {
      if (!['display', 'practice', 'preview', 'export'].includes(key)) return;
      currentKey = key;
      setActiveButton(key);

      if (cleanup) {
        try { cleanup(); } catch (_) {}
        cleanup = null;
      }

      // 演示 / 练习
      if (key === 'display' || key === 'practice') {
        if (window.HanziWidgets && window.HanziWidgets.display && window.HanziWidgets.display.mount) {
          cleanup = window.HanziWidgets.display.mount(mountAreaEl, {
            hz: currentHz,
            mode: key
          });
        }
        return;
      }

      // 预览 / 导出
      if (key === 'preview' || key === 'export') {
        if (window.HanziWidgets && window.HanziWidgets.preview && window.HanziWidgets.preview.mount) {
          cleanup = window.HanziWidgets.preview.mount(mountAreaEl, {
            hz: currentHz,
            mode: key === 'export' ? 'export' : 'preview'
          });
        }
      }
    }

    function applySearchAndRefresh() {
      const hz = (hzInputEl.value || '').trim() || '汉';
      currentHz = hz;
      updateUrl(currentKey, hz);
      mountCurrent(currentKey);
    }

    function buildStandaloneUrl(key) {
      const href = pageHrefMap[key];
      if (!href) return null;
      const url = new URL(href, window.location.href);
      const hz = (hzInputEl.value || '').trim() || '汉';
      url.searchParams.set('hz', hz);
      return url.toString();
    }

    function hideContextMenu() {
      if (!menuEl) return;
      menuEl.remove();
      menuEl = null;
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch (_) {
        try {
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly', '');
          ta.style.position = 'fixed';
          ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand('copy');
          ta.remove();
          return !!ok;
        } catch (_) {
          return false;
        }
      }
    }

    function showContextMenu(e, key) {
      e.preventDefault();
      hideContextMenu();

      const url = buildStandaloneUrl(key);
      if (!url) return;

      const menu = document.createElement('div');
      menu.className = 'index-context-menu';
      menu.setAttribute('role', 'menu');

      function addMenuItem(text, onClick) {
        const item = document.createElement('button');
        item.type = 'button';
        item.className = 'index-context-menu-item';
        item.textContent = text;
        item.addEventListener('click', async () => {
          hideContextMenu();
          await onClick();
        });
        menu.appendChild(item);
      }

      addMenuItem('在当前页面打开对应功能页', async () => {
        window.location.href = url;
      });
      addMenuItem('在新标签页打开对应功能页', async () => {
        window.open(url, '_blank', 'noopener,noreferrer');
      });
      addMenuItem('复制对应功能页链接', async () => {
        const ok = await copyText(url);
        if (!ok) window.alert('复制失败，请手动复制链接。');
      });

      document.body.appendChild(menu);

      const { innerWidth, innerHeight } = window;
      const rect = menu.getBoundingClientRect();
      const nextLeft = Math.min(e.clientX, Math.max(8, innerWidth - rect.width - 8));
      const nextTop = Math.min(e.clientY, Math.max(8, innerHeight - rect.height - 8));
      menu.style.left = `${nextLeft}px`;
      menu.style.top = `${nextTop}px`;
      menuEl = menu;
    }

    btnEls.forEach(btn => {
      btn.addEventListener('click', () => {
        const key = btn.dataset.pageKey;
        if (!['display', 'practice', 'preview', 'export'].includes(key)) return;
        updateUrl(key, currentHz);
        mountCurrent(key);
      });
      btn.addEventListener('contextmenu', (e) => {
        const key = btn.dataset.pageKey;
        if (!['display', 'practice', 'preview', 'export'].includes(key)) return;
        showContextMenu(e, key);
      });
    });

    hzInputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        applySearchAndRefresh();
      }
    });
    hzInputEl.addEventListener('blur', applySearchAndRefresh);
    document.addEventListener('click', () => hideContextMenu());
    document.addEventListener('scroll', () => hideContextMenu(), true);
    window.addEventListener('resize', () => hideContextMenu());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideContextMenu();
    });

    updateUrl(currentKey, currentHz);
    mountCurrent(currentKey);
  })();
</script>
