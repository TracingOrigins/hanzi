<div id="svg-container"></div>
<div class="export-controls">
  <button class="practice-button" id="btnDownload" type="button">导出为图片</button>
  <span style="margin-left:8px; font-size:12px; opacity:0.8;">尺寸：</span>
  <select id="sizeSelect" style="font-size:12px; padding:2px 6px; border-radius:6px; border:1px solid var(--input-border); background:var(--input-bg); color:var(--text-color);">
    <option value="512">512px</option>
    <option value="1024" selected>1024px</option>
    <option value="2048">2048px</option>
  </select>
  <span style="margin-left:8px; font-size:12px; opacity:0.8;">颜色：</span>
  <select id="colorSelect" style="font-size:12px; padding:2px 6px; border-radius:6px; border:1px solid var(--input-border); background:var(--input-bg); color:var(--text-color);">
    <option value="default" selected>跟随主题</option>
    <option value="#000000">黑色</option>
    <option value="#333333">深灰</option>
    <option value="#2383e2">蓝色</option>
    <option value="#d0302f">红色</option>
  </select>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const initText = (params.get('hz') || '汉').trim();
    const filename = (window.location.pathname || '').split('/').pop() || '';
    // 目前 pages.json 中导出页为 export.html，预览页为 svg.html
    // 只要包含 export 即认为是“导出模式”，从而：
    // 1）加上 html.is-export 方便 CSS 控制布局与按钮显隐；
    // 2）启用尺寸/颜色控制和下载按钮行为。
    const IS_EXPORT = filename.includes('export');
    document.documentElement.classList.toggle('is-export', IS_EXPORT);

    function getCssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function normalizeText(text) {
        const raw = (text ?? '').toString();
        return Array.from(raw)
            .map(c => c.trim())
            .filter(Boolean);
    }

    const DEFAULT_COLS = 7;
    const CELL_VIEWBOX = 1024;
    // 单字导出页面的 SVG 没显式 width/height，浏览器默认会按类似尺寸渲染；
    // 这里为“合并后仍保持字形显示大小”而显式设定一个每格的 viewport。
    // 令每格为正方形，避免导出 SVG 的纵横比不一致导致字形被额外留白/缩放。
    const CELL_IMG_W = 160;
    const CELL_IMG_H = 160;
    // 多字网格里每个字符单元之间的间距（单位：预览/导出图片像素）
    const CELL_GAP_PX = 8;
    // 用于在页面预览时匹配生成图片的实际像素尺寸，避免因为 #svg-container 默认 160x160 而发生二次缩放。

    // 与 DOM 渲染保持一致的“padding->缩放/平移”映射：
    // DOM 里 HanziWriter 使用 padding = Math.round(size * 0.14)，且 size=160。
    const DOM_SIZE_PX = CELL_IMG_W;
    const DOM_PADDING_PX = Math.round(DOM_SIZE_PX * 0.14);
    const padViewBox = (DOM_PADDING_PX / DOM_SIZE_PX) * CELL_VIEWBOX;
    const domScale = (DOM_SIZE_PX - 2 * DOM_PADDING_PX) / DOM_SIZE_PX;

    let currentObjectUrl = null;
    let currentSvgString = '';
    let sizeSelectEl = null;
    let colorSelectEl = null;

    function getSizeScale() {
        if (!IS_EXPORT || !sizeSelectEl || !sizeSelectEl.value) return 1;
        const v = Number(sizeSelectEl.value);
        if (Number.isNaN(v) || v <= 0) return 1;
        return v / 1024;
    }

    function getStrokeColorForExport() {
        let strokeColor = getCssVar('--writer-stroke');
        if (IS_EXPORT && colorSelectEl && colorSelectEl.value && colorSelectEl.value !== 'default') {
            strokeColor = colorSelectEl.value;
        }
        return strokeColor;
    }

    async function generateCombinedSvg(chars, opts = {}) {
        const { includeCellBorders = false, strokeColorOverride = null, sizeScale = 1 } = opts;
        const cols = Math.min(DEFAULT_COLS, chars.length);
        const rows = Math.ceil(chars.length / cols);

        const gapViewBoxX = (CELL_GAP_PX * CELL_VIEWBOX) / CELL_IMG_W;
        const gapViewBoxY = (CELL_GAP_PX * CELL_VIEWBOX) / CELL_IMG_H;

        const viewBoxW = cols * CELL_VIEWBOX + (cols - 1) * gapViewBoxX;
        const viewBoxH = rows * CELL_VIEWBOX + (rows - 1) * gapViewBoxY;
        const baseImgW = cols * CELL_IMG_W + (cols - 1) * CELL_GAP_PX;
        const baseImgH = rows * CELL_IMG_H + (rows - 1) * CELL_GAP_PX;
        const imgW = baseImgW * sizeScale;
        const imgH = baseImgH * sizeScale;

        let strokeColor = getCssVar('--writer-stroke');
        if (strokeColorOverride) {
            strokeColor = strokeColorOverride;
        }
        const borderColor = getCssVar('--border-color');
        const borderRadiusPx = 8;
        const borderStrokeWidthPx = 1;
        const rx = (borderRadiusPx * CELL_VIEWBOX) / CELL_IMG_W;
        const ry = (borderRadiusPx * CELL_VIEWBOX) / CELL_IMG_H;

        let svgString = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${viewBoxW} ${viewBoxH}" width="${imgW}" height="${imgH}">`;

        for (let i = 0; i < chars.length; i++) {
            const ch = chars[i];
            const col = i % cols;
            const row = Math.floor(i / cols);
            const cellX = col * (CELL_VIEWBOX + gapViewBoxX);
            const cellY = row * (CELL_VIEWBOX + gapViewBoxY);

            const data = await HanziWriter.loadCharacterData(ch);

            if (includeCellBorders) {
                svgString += `<rect x="${cellX}" y="${cellY}" width="${CELL_VIEWBOX}" height="${CELL_VIEWBOX}" fill="none" stroke="${borderColor}" stroke-width="${borderStrokeWidthPx}" vector-effect="non-scaling-stroke" rx="${rx}" ry="${ry}" />`;
            }
            svgString += `<g transform="translate(${cellX}, ${cellY}) translate(${padViewBox}, ${padViewBox}) scale(${domScale}, -${domScale}) translate(0, -900)">`;
            data.strokes.forEach(path => {
                svgString += `<path d="${path}" fill="${strokeColor}" />`;
            });
            svgString += `</g>`;
        }

        svgString += `</svg>`;
        return svgString;
    }

    async function renderAll() {
        const container = document.getElementById('svg-container');
        container.innerHTML = '';

        const chars = normalizeText(initText);

        if (chars.length === 0) {
            container.innerHTML = '<p style="color:var(--fg-subtle)">请输入至少 1 个字符（建议汉字）。</p>';
            return;
        }

        const cols = Math.min(DEFAULT_COLS, chars.length);
        const rows = Math.ceil(chars.length / cols);
        const sizeScale = getSizeScale();
        const baseWidth = cols * CELL_IMG_W + (cols - 1) * CELL_GAP_PX;
        const baseHeight = rows * CELL_IMG_H + (rows - 1) * CELL_GAP_PX;
        const pixelWidth = baseWidth * sizeScale;
        const pixelHeight = baseHeight * sizeScale;

        // 覆盖 inline/export 默认 160x160，保证预览不会缩放导致“每个字大小自适应”。
        container.style.width = `${pixelWidth}px`;
        container.style.height = `${pixelHeight}px`;
        document.body.style.overflow = 'auto';

        try {
            if (IS_EXPORT) {
                const strokeColor = getStrokeColorForExport();
                // export：预览有边框（overlay），导出图片本体无边框
                const svgString = await generateCombinedSvg(chars, {
                    includeCellBorders: false,
                    strokeColorOverride: strokeColor,
                    sizeScale
                });
                currentSvgString = svgString;
                const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });

                if (currentObjectUrl) URL.revokeObjectURL(currentObjectUrl);
                currentObjectUrl = URL.createObjectURL(blob);

                container.style.border = 'none';
                container.style.borderRadius = '0';
                container.style.setProperty('--preview-cols', String(cols));
                container.style.setProperty('--preview-rows', String(rows));
                container.style.setProperty('--preview-cell', `${CELL_IMG_W * sizeScale}px`);
                container.style.setProperty('--preview-gap', `${CELL_GAP_PX * sizeScale}px`);

                const img = document.createElement('img');
                img.src = currentObjectUrl;
                img.alt = initText;
                container.appendChild(img);

                const overlay = document.createElement('div');
                overlay.className = 'preview-grid-overlay';
                overlay.setAttribute('aria-hidden', 'true');
                for (let i = 0; i < cols * rows; i++) {
                    const cell = document.createElement('div');
                    overlay.appendChild(cell);
                }
                container.appendChild(overlay);
            } else {
                // inline：直接插入 SVG（边框画进 SVG，和原 multi-char-inline-svg 行为一致）
                container.style.border = 'none';
                container.style.borderRadius = '0';
                const svgString = await generateCombinedSvg(chars, { includeCellBorders: true });
                container.innerHTML = svgString;
            }
        } catch (e) {
            container.innerHTML = `<p style="color:red">图片生成失败</p>`;
            console.error(e);
        }
    }

    function downloadCurrentSvg() {
        if (!currentSvgString) return;
        const name = (initText || 'hanzi').trim() || 'hanzi';
        const a = document.createElement('a');
        const blob = new Blob([currentSvgString], { type: 'image/svg+xml;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = `${name}.svg`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
    }

    window.addEventListener('load', () => {
        sizeSelectEl = document.getElementById('sizeSelect');
        colorSelectEl = document.getElementById('colorSelect');

        renderAll();

        const btn = document.getElementById('btnDownload');
        if (btn) {
            btn.addEventListener('click', downloadCurrentSvg);
        }

        if (sizeSelectEl) {
            sizeSelectEl.addEventListener('change', () => {
                currentSvgString = '';
                renderAll();
            });
        }
        if (colorSelectEl) {
            colorSelectEl.addEventListener('change', () => {
                currentSvgString = '';
                renderAll();
            });
        }
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        currentSvgString = '';
        renderAll();
    });
</script>
