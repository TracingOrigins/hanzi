<div id="preview-mount" class="widget-mount"></div>

<script src="./assets/utils/download.js"></script>
<script src="./assets/utils/svg-rasterize.js"></script>
<script src="./assets/widgets/preview.widget.js"></script>
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const hz = (params.get('hz') || '汉').trim() || '汉';
    const filename = (window.location.pathname || '').split('/').pop() || '';
    const mode = filename.includes('export') ? 'export' : 'preview';

    const mountEl = document.getElementById('preview-mount');
    if (window.HanziWidgets && window.HanziWidgets.preview && window.HanziWidgets.preview.mount) {
      window.HanziWidgets.preview.mount(mountEl, { hz, mode });
    }
  })();
</script>
