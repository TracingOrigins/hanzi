<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>汉字笔顺 · 练习</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <link rel="stylesheet" href="./assets/styles/site.css">
  <link rel="stylesheet" href="./assets/styles/char.css">
</head>
<body>
<div id="display-mount" class="widget-mount"></div>

<script src="./assets/widgets/display.widget.js"></script>
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    const hz = (params.get('hz') || '汉').trim() || '汉';
    const filename = (window.location.pathname || '').split('/').pop() || '';
    const mode = filename.includes('practice') ? 'practice' : 'display';

    const mountEl = document.getElementById('display-mount');
    if (window.HanziWidgets && window.HanziWidgets.display && window.HanziWidgets.display.mount) {
      window.HanziWidgets.display.mount(mountEl, { hz, mode });
    }
  })();
</script>


</body>
</html>
